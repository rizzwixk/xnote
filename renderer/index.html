<!DOCTYPE html> <!-- HTML5 document type declaration -->
<html lang="en"> <!-- Root element with English language attribute -->
<head>
  <meta charset="UTF-8"> <!-- Unicode character encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive viewport scaling -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"> <!-- Restricts resources to same origin only -->
  <title>xnote v1.1.3</title> <!-- Browser tab/window title -->
  <link rel="stylesheet" href="styles.css"> <!-- Link to the application stylesheet -->
</head>
<body class="dark"> <!-- Body starts in dark theme mode -->

  <!-- Custom frameless titlebar with macOS-style window controls -->
  <div id="titlebar">
    <img id="titlebarTitle" src="assets/logo.svg" alt="xnote" /> <!-- App logo displayed in titlebar -->
    <div id="titlebarControls"> <!-- Container for window control buttons -->
      <!-- Minimize button (yellow traffic light style) -->
      <button class="titlebar-btn mac-min" id="minBtn">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="2" y1="5" x2="8" y2="5" stroke="#997a1c" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <!-- Maximize/restore button (green traffic light style) -->
      <button class="titlebar-btn mac-max" id="maxBtn">
        <svg id="maxIcon" width="8" height="8" viewBox="0 0 8 8"><rect x="1" y="1" width="6" height="6" rx="0.8" fill="none" stroke="#176625" stroke-width="1.2"/></svg>
        <svg id="restoreIcon" width="8" height="8" viewBox="0 0 8 8" style="display:none"><rect x="0.8" y="1.8" width="5.5" height="5.5" rx="0.7" fill="none" stroke="#176625" stroke-width="1.2"/><rect x="2.3" y="0.3" width="5.5" height="5.5" rx="0.7" fill="none" stroke="#176625" stroke-width="1.2"/></svg>
      </button>
      <!-- Close button (red traffic light style) -->
      <button class="titlebar-btn mac-close" id="closeBtn">
        <svg width="8" height="8" viewBox="0 0 8 8"><line x1="1.2" y1="1.2" x2="6.8" y2="6.8" stroke="#993934" stroke-width="1.3" stroke-linecap="round"/><line x1="6.8" y1="1.2" x2="1.2" y2="6.8" stroke="#993934" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Main application layout -->
  <div id="app">
    <main>
      <!-- Left sidebar: note list and controls -->
      <aside id="sidebar">
        <div id="sidebarHeader"> <!-- Sidebar toolbar -->
          <button id="newNoteBtn">+ New Note</button> <!-- Create new note button -->
          <button id="themeToggle" title="Toggle theme"> <!-- Dark/light theme toggle -->
            <div id="lottieContainer"></div> <!-- Lottie animation container for sun/moon transition -->
          </button>
        </div>
        <ul id="noteList"></ul> <!-- Dynamic list of all notes -->
      </aside>

      <!-- Right panel: note editor -->
      <section id="editor">
        <input id="titleInput" type="text" placeholder="Note title..." /> <!-- Note title input field -->
        <textarea id="contentInput" placeholder="Write your note here..."></textarea> <!-- Note content textarea -->
        <div id="formatSuggestion" class="format-suggestion" role="status" aria-live="polite" hidden>
          <div class="format-suggestion-copy">Want to tidy the format?</div>
          <button id="suggestFormatBtn" type="button">Suggest</button>
          <button id="dismissSuggestionBtn" class="suggestion-dismiss" type="button" aria-label="Dismiss formatting suggestion">×</button>
        </div>
        <div id="editorFooter"> <!-- Editor footer bar -->
          <div id="editorStatus"></div> <!-- Status messages (save confirmations, AI progress) -->
        </div>
      </section>
    </main>
  </div>

  <!-- Lottie animation library for theme toggle transition -->
  <script src="../node_modules/lottie-web/build/player/lottie.min.js"></script>
  <!-- Application logic (must load after Lottie) -->
  <script src="app.js"></script>
</body>
</html>
